<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Examenes · Santo Cura de Ars</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --az:#1B3A6B;--az2:#DCE8F5;--ve:#1B5E20;--ve2:#E8F5E9;
  --am:#7B5800;--am2:#FFF8DC;--ro:#B71C1C;--ro2:#FFEBEE;
  --bg:#F0F4F8;--card:#fff;--txt:#1A1A1A;--sub:#555;--brd:#E0E0E0;
  --warn:#E65100;--warn2:#FFF3E0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:15px}
nav{background:var(--az);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.nav-title{font-size:16px;font-weight:700;flex:1}
.nav-sub{font-size:12px;opacity:.7;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#timer-display{background:rgba(255,255,255,.15);border-radius:6px;padding:4px 12px;font-size:15px;font-weight:700;letter-spacing:.05em;display:none}
#timer-display.warn{background:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.main{max-width:820px;margin:0 auto;padding:20px 14px}
.card{background:var(--card);border-radius:12px;border:1px solid var(--brd);padding:22px;margin-bottom:14px}
h2{font-size:17px;font-weight:700;color:var(--az);margin-bottom:12px}
label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:4px;margin-top:10px}
input[type=text],input[type=number],input[type=password],select,textarea{
  width:100%;border:1.5px solid var(--brd);border-radius:8px;padding:10px 12px;
  font-size:15px;font-family:Arial,sans-serif;background:#fff;color:var(--txt)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--az)}
textarea{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:.15s}
.btn-primary{background:var(--az);color:#fff}.btn-primary:hover{background:#15305A}
.btn-success{background:var(--ve);color:#fff}.btn-success:hover{background:#145218}
.btn-danger{background:var(--ro);color:#fff}
.btn-warn{background:var(--warn);color:#fff}
.btn-outline{background:transparent;color:var(--az);border:1.5px solid var(--az)}.btn-outline:hover{background:var(--az2)}
.btn-gray{background:#ECEFF1;color:#37474F;border:none}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-xs{padding:4px 8px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.badge-on{background:var(--ve2);color:var(--ve)}
.badge-off{background:var(--ro2);color:var(--ro)}
.badge-gray{background:#ECEFF1;color:#37474F}
.badge-am{background:var(--am2);color:var(--am)}

/* ── SELECTOR DE GRADO ─────────────────────────────────────── */
.selector-wrap{padding:8px 0}
.selector-titulo{text-align:center;font-size:13px;color:rgba(255,255,255,.75);
  margin-bottom:16px;letter-spacing:.05em;text-transform:uppercase;font-weight:700}
.grado-btn{
  display:flex;align-items:center;width:100%;border:none;border-radius:14px;
  cursor:pointer;overflow:hidden;margin-bottom:10px;min-height:88px;
  position:relative;transition:transform .15s,box-shadow .15s;
  box-shadow:0 3px 10px rgba(0,0,0,.18)}
.grado-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.25)}
.grado-btn:active{transform:translateY(0);box-shadow:0 2px 6px rgba(0,0,0,.2)}
.grado-btn-left{
  display:flex;flex-direction:column;justify-content:center;
  padding:14px 18px 14px 22px;min-width:120px;z-index:1}
.grado-num{font-size:38px;font-weight:700;color:#fff;line-height:1;
  text-shadow:0 2px 6px rgba(0,0,0,.25)}
.grado-nombre{font-size:11px;color:rgba(255,255,255,.8);font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.grado-etapa{font-size:10px;color:rgba(255,255,255,.6);margin-top:1px;font-style:italic}
.grado-btn-right{flex:1;display:flex;align-items:center;justify-content:flex-end;
  padding-right:16px;opacity:.9}
.grado-btn-right svg{width:90px;height:80px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2))}
.grado-unavail{opacity:.55;cursor:default}
.grado-unavail:hover{transform:none;box-shadow:0 3px 10px rgba(0,0,0,.18)}
.grado-tag{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.25);
  color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;
  letter-spacing:.04em}

/* ── PREGUNTAS ────────────────────────────────────────────── */
.pregunta-card{background:#fff;border:1.5px solid var(--brd);border-radius:10px;padding:18px;margin-bottom:12px}
.pregunta-num{display:inline-flex;align-items:center;justify-content:center;background:var(--az);color:#fff;border-radius:50%;width:26px;height:26px;font-size:13px;font-weight:700;margin-right:8px;flex-shrink:0}
.pregunta-header{display:flex;align-items:flex-start;margin-bottom:12px}
.pregunta-txt{font-size:15px;font-weight:700;line-height:1.5;flex:1}
.pts-badge{flex-shrink:0;font-size:11px;background:var(--am2);color:var(--am);border-radius:4px;padding:2px 7px;font-weight:700;margin-left:8px}
.op-list{display:flex;flex-direction:column;gap:7px}
.op-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1.5px solid var(--brd);border-radius:8px;cursor:pointer;background:#fff;font-size:14px;width:100%;text-align:left}
.op-btn:hover{border-color:var(--az);background:var(--az2)}
.op-btn.selected{border-color:var(--az);background:var(--az2);font-weight:700;border-width:2.5px}
.op-letra{width:26px;height:26px;border-radius:50%;background:var(--az);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.vf-row{display:flex;gap:10px}
.vf-btn{flex:1;padding:12px;border:1.5px solid var(--brd);border-radius:8px;cursor:pointer;font-size:15px;font-weight:700;text-align:center;background:#fff}
.vf-btn:hover{border-color:var(--az);background:var(--az2)}
.vf-btn.sel-v{border-color:#185FA5;background:#DCE8F5;color:#0C447C}
.vf-btn.sel-f{border-color:#854F0B;background:#FAEEDA;color:#633806}
.completar-txt{font-size:15px;line-height:2.4}
.blank-input{border:none;border-bottom:2px solid var(--az);background:transparent;font-size:15px;padding:2px 4px;width:130px;text-align:center;color:var(--az);font-weight:700;font-family:Arial,sans-serif}
.blank-input:focus{outline:none;border-bottom-color:var(--ve)}
.orden-list{display:flex;flex-direction:column;gap:6px}
.orden-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--brd);border-radius:8px;background:#fff;cursor:grab;user-select:none}
.orden-item:hover{border-color:var(--az);background:var(--az2)}
.orden-item.dragging{opacity:.35;border-style:dashed}
.orden-item.dragover{border-color:var(--ve);background:var(--ve2)}
.orden-handle{color:#bbb;font-size:18px}
.orden-pos{width:22px;height:22px;border-radius:50%;background:var(--az);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.escala-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.escala-btn{flex:1;min-width:46px;padding:10px 4px;border:1.5px solid var(--brd);border-radius:8px;text-align:center;cursor:pointer;background:#fff}
.escala-btn:hover{border-color:var(--az);background:var(--az2)}
.escala-btn.selected{border-color:var(--az);background:var(--az);color:#fff}
.escala-num{font-size:18px;font-weight:700}
.escala-lbl{font-size:11px;margin-top:2px}
.secure-area{position:relative}
.secure-icon{position:absolute;top:8px;right:10px;font-size:11px;color:#aaa;background:#f5f5f5;border-radius:4px;padding:2px 6px;pointer-events:none}
.secure-area textarea{padding-right:76px}

/* Admin */
.exam-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--brd);flex-wrap:wrap}
.exam-row:last-child{border-bottom:none}
.exam-info{flex:1;min-width:160px}
.exam-name{font-weight:700;font-size:14px}
.exam-meta{font-size:12px;color:var(--sub);margin-top:2px}
.toggle-btn{width:50px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;flex-shrink:0}
.toggle-btn.on{background:var(--ve)}.toggle-btn.off{background:#ccc}
.toggle-knob{position:absolute;top:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.25s}
.toggle-btn.on .toggle-knob{left:27px}.toggle-btn.off .toggle-knob{left:3px}
.sec-chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.sec-chip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--brd);background:#fff}
.sec-chip.active{background:var(--az);color:#fff;border-color:var(--az)}
.form-sec{border:1px solid var(--brd);border-radius:10px;padding:14px;margin-bottom:12px}
.form-sec-title{font-size:12px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.q-builder{border:1px solid #C5D5E8;border-radius:8px;padding:12px;margin-bottom:8px;background:#FAFBFF}
.q-type-pill{display:inline-block;background:var(--az2);color:var(--az);font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;margin-bottom:6px}
.remove-q{float:right;background:var(--ro2);color:var(--ro);border:none;border-radius:6px;padding:3px 8px;font-size:12px;cursor:pointer;font-weight:700}
.est-table{width:100%;border-collapse:collapse;font-size:13px}
.est-table th{background:var(--az);color:#fff;padding:7px 10px;text-align:left;font-size:12px}
.est-table td{padding:7px 10px;border-bottom:1px solid var(--brd)}
.est-table tr:hover td{background:var(--az2)}
.admin-tabs{display:flex;gap:0;border-bottom:2px solid var(--az2);margin-bottom:18px}
.admin-tab{padding:8px 16px;cursor:pointer;font-size:14px;font-weight:700;color:var(--sub);border-bottom:3px solid transparent;margin-bottom:-2px}
.admin-tab.active{color:var(--az);border-bottom-color:var(--az)}
.archived-row{background:#FFFDE7}
.enviado-box{text-align:center;padding:36px 16px}
.enviado-icon{font-size:52px;margin-bottom:12px}
.enviado-title{font-size:22px;font-weight:700;color:var(--ve);margin-bottom:8px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--az);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;
  font-weight:700;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#copy-toast{display:none;position:fixed;bottom:72px;left:50%;transform:translateX(-50%);
  background:var(--warn);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;
  font-weight:700;z-index:9999;pointer-events:none}
.info-box{background:var(--az2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--az);margin-bottom:12px}
.warn-box{background:var(--warn2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--warn)}
.success-box{background:var(--ve2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--ve)}
@media(max-width:600px){
  .op-btn{font-size:13px}.vf-row{flex-direction:column}.escala-btn{min-width:38px}
  nav{gap:6px}.grado-num{font-size:30px}.grado-btn-right svg{width:72px;height:64px}
}
</style>
</head>

// ── SECURITY ──────────────────────────────────────────────────
document.addEventListener('copy', e=>{ if(S.adminAuth) return; e.preventDefault(); showCopyToast(); });
document.addEventListener('contextmenu', e=>{ if(S.adminAuth) return; e.preventDefault(); showCopyToast(); });
function showCopyToast(){
  const el=document.getElementById('copy-toast');
  el.style.display='block';
  clearTimeout(window._cpt);
  window._cpt=setTimeout(()=>el.style.display='none',2500);
}
function secureEl(el){
  if(!el) return;
  el.addEventListener('paste', e=>{ e.preventDefault(); showCopyToast(); });
  el.addEventListener('drop', e=>e.preventDefault());
  el.addEventListener('contextmenu', e=>e.preventDefault());
}

// ── TOAST ──────────────────────────────────────────────────────
function toast(msg,ms=2500){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),ms);
}

// ── TIMER ──────────────────────────────────────────────────────
function startTimer(min){
  S.timerSec=min*60; S.timerStart=Date.now();
  const d=document.getElementById('timer-display');
  d.style.display='block';
  clearInterval(S.timerInterval);
  S.timerInterval=setInterval(()=>{
    const rem=Math.max(0,S.timerSec-Math.floor((Date.now()-S.timerStart)/1000));
    const m=Math.floor(rem/60), s=rem%60;
    d.textContent=m+':'+(s<10?'0':'')+s;
    if(rem<=300) d.classList.add('warn'); else d.classList.remove('warn');
    if(rem===0){ clearInterval(S.timerInterval); submitExamen(true); }
  },500);
}
function stopTimer(){
  clearInterval(S.timerInterval);
  document.getElementById('timer-display').style.display='none';
}
function tiempoUsado(){ return S.timerStart?Math.floor((Date.now()-S.timerStart)/1000):0; }

// ── UTILS ──────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function normalizeName(s){ return String(s||'').toLowerCase().trim().replace(/\s+/g,' '); }
function render(){
  switch(S.view){
    case 'selector':    renderSelector(); break;
    case 'materias':    renderMaterias(); break;
    case 'inicio':      renderInicio(); break;
    case 'registro':    renderRegistro(); break;
    case 'examen':      renderExamen(); break;
    case 'enviado':     renderEnviado(); break;
    case 'admin-login': renderAdminLogin(); break;
    case 'admin':       renderAdmin(); break;
    case 'admin-crear': renderAdminCrear(); break;
    case 'admin-resp':  renderAdminResp(); break;
  }
}

      <div style="font-size:40px;margin-bottom:12px">📭</div>

async function confirmarRegistro(){
  const nombre=document.getElementById('r-nombre').value.trim();
  const orden=parseInt(document.getElementById('r-orden').value)||0;
  const seccion=document.getElementById('r-seccion').value;
  const grado=document.getElementById('r-grado').value;
  const errEl=document.getElementById('reg-error');
  const btn=document.getElementById('btn-comenzar');
  function showErr(msg){errEl.style.display='block';errEl.textContent=msg;}
  errEl.style.display='none';
  if(!nombre||!seccion||!grado||orden<1){showErr('Completa todos los campos correctamente.');return;}
  btn.disabled=true; btn.textContent='Verificando...';
  const secs=S.examen.secciones_activas||[];
  if(secs.length>0 && !secs.includes(seccion)){
    showErr('Este examen no está habilitado para la sección '+seccion+'. Secciones autorizadas: '+secs.join(', '));
    btn.disabled=false; btn.textContent='Comenzar examen'; return;
  }
  if(S.examen.validar_lista){
    const {data:estFound}=await sb.from('estudiantes_lista')
      .select('id,nombre,numero_orden').eq('grado',grado).eq('seccion',seccion)
      .eq('numero_orden',orden).eq('activo',true);
    if(!estFound||estFound.length===0){
      showErr('El número '+orden+' no está registrado en la lista de '+grado+' sección '+seccion+'.');
      btn.disabled=false; btn.textContent='Comenzar examen'; return;
    }
    const match=estFound.find(e=>normalizeName(e.nombre).includes(normalizeName(nombre).split(' ')[0])||normalizeName(nombre).includes(normalizeName(e.nombre).split(' ')[0]));
    if(!match){
      showErr('El nombre no coincide con el número '+orden+'. Nombre esperado: '+estFound[0].nombre);
      btn.disabled=false; btn.textContent='Comenzar examen'; return;
    }
  }
  const {data:dup}=await sb.from('respuestas_examenes').select('id')
    .eq('examen_id',S.examen.id).eq('numero_orden',orden).eq('seccion',seccion).eq('grado',grado).limit(1);
  if(dup&&dup.length>0){
    showErr('Ya hay una respuesta registrada para el número '+orden+' de la sección '+seccion+'. Solo se permite un envío.');
    btn.disabled=false; btn.textContent='Comenzar examen'; return;
  }
  S.est={nombre,orden,grado,seccion};
  S.view='examen'; S.currentQ=0;
  (S.examen.preguntas||[]).forEach((q,i)=>{ if(q.tipo==='ordenar') S.ordenItems[i]=[...q.items]; });
  render();
  if(S.examen.tiempo_minutos>0) startTimer(S.examen.tiempo_minutos);
}

function renderExamen(){
  const qs=S.examen.preguntas||[];
  if(S.currentQ===undefined) S.currentQ=0;
  const qi=Math.min(S.currentQ, qs.length-1);
  const resp_count=Object.keys(S.resp).length;
  document.getElementById('nav-sub').textContent=S.est.nombre+' · '+S.est.seccion;
  const pct=qs.length>0?Math.round(resp_count/qs.length*100):0;
  let navDots=qs.map((_,i)=>{
    const ans=S.resp[i]!==undefined&&S.resp[i]!==null&&S.resp[i]!=='';
    const active=i===qi;
    let bg=active?'#1B3A6B':(ans?'#1B5E20':'#ccc');
    return `<div onclick="goToQ(${i})" style="width:${active?'28px':'10px'};height:10px;border-radius:5px;background:${bg};cursor:pointer;transition:.2s;flex-shrink:0"></div>`;
  }).join('');
  let html=`
  <div style="background:#fff;border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin-bottom:12px;position:sticky;top:52px;z-index:10">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <span style="font-size:13px;color:var(--sub)">Pregunta <strong style="color:var(--txt)">${qi+1}</strong> de <strong style="color:var(--txt)">${qs.length}</strong></span>
      <span style="font-size:13px;color:var(--sub)">${resp_count} respondidas</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">${navDots}</div>
    <div style="display:flex;gap:2px;margin-top:6px">
      <div style="width:${pct}%;height:4px;background:#1B3A6B;border-radius:2px 0 0 2px"></div>
      <div style="flex:1;height:4px;background:#e0e0e0;border-radius:0 2px 2px 0"></div>
    </div>
  </div>`;
  html += renderPregunta(qs[qi], qi);
  const isLast = qi === qs.length-1;
  const answered = S.resp[qi]!==undefined && S.resp[qi]!==null && S.resp[qi]!=='';
  html+=`<div style="display:flex;gap:10px;margin-top:4px">

      inner=`<div class="orden-list" id="ord_${i}">`+items.map((it,ii)=>`

function initDrag(){
  document.querySelectorAll('.orden-list').forEach(list=>{
    const qi=parseInt(list.id.split('_')[1]);
    let src=null;
    list.querySelectorAll('.orden-item').forEach(item=>{
      item.addEventListener('dragstart',e=>{src=item;item.classList.add('dragging');});

      item.addEventListener('dragleave',()=>item.classList.remove('dragover'));
      item.addEventListener('drop',e=>{
        e.preventDefault(); item.classList.remove('dragover');
        if(!src||src===item) return;
        const items=Array.from(list.querySelectorAll('.orden-item'));
        const fi=items.indexOf(src), ti=items.indexOf(item);

// ── AUTO-GRADING ───────────────────────────────────────────────
function normText(s){
  return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,'').trim();
}
function calcularNota(examen, respuestas){
  const qs=examen.preguntas||[];
  const detalle=[]; let puntos_auto=0, puntos_texto_max=0, puntos_maximo=0;
  qs.forEach((q,i)=>{
    const pts=q.puntos||0; puntos_maximo+=pts;
    const resp=respuestas[i];
    const item={qi:i,tipo:q.tipo,pts_max:pts,pts:0,auto:false,pendiente:false};
    switch(q.tipo){
      case 'multiple':{item.auto=true;const L=['A','B','C','D'];const corrIdx=L.indexOf(q.correcta);if(resp===corrIdx)item.pts=pts;break;}
      case 'vf':{item.auto=true;if(String(resp)===String(q.correcta))item.pts=pts;break;}
      case 'ordenar':{item.auto=true;const correctOrder=q.items||[];const studentOrder=Array.isArray(resp)?resp:[];if(studentOrder.length===0){item.pts=0;break;}let matches=0;correctOrder.forEach((it,ci)=>{if(normText(studentOrder[ci])===normText(it))matches++;});if(matches===correctOrder.length){item.pts=pts;}else if(matches>=Math.ceil(correctOrder.length/2)){item.pts=Math.round(pts*matches/correctOrder.length);}item.detalle=matches+'/'+correctOrder.length+' en orden correcto';break;}
      case 'completar':{item.auto=true;const correctBlanks=q.respuestas||[];if(correctBlanks.length===0){item.pts=pts;break;}const studentBlanks=resp&&typeof resp==='object'?resp:{};let blancoCorrectos=0;correctBlanks.forEach((correct,bi)=>{const given=normText(studentBlanks[bi]||'');const correctNorm=normText(correct);if(given===correctNorm||(given.length>3&&correctNorm.includes(given))||(correctNorm.length>3&&given.includes(correctNorm.substring(0,Math.ceil(correctNorm.length*0.6))))){blancoCorrectos++;}});item.pts=Math.round(pts*blancoCorrectos/correctBlanks.length);item.detalle=blancoCorrectos+'/'+correctBlanks.length+' blancos correctos';break;}
      case 'texto':{item.pendiente=true;puntos_texto_max+=pts;break;}
      case 'escala':{item.auto=true;item.pts=resp!==undefined&&resp!==null&&resp!==''?pts:0;item.detalle='participacion';break;}
    }
    if(item.auto) puntos_auto+=item.pts;
    detalle.push(item);
  });
  return {puntos_auto,puntos_texto_max,puntos_maximo,detalle};
}

async function submitExamen(auto){
  if(!auto){
    const qs=S.examen.preguntas||[];
    const sin=qs.length-Object.keys(S.resp).length;
    if(sin>0&&!confirm('Tienes '+sin+' pregunta(s) sin responder. ¿Enviar de todas formas?')) return;
  }
  stopTimer();
  document.querySelectorAll('.secure-txt').forEach(el=>{
    if(el.id&&el.id.startsWith('txt_')){const qi=parseInt(el.id.split('_')[1]);if(el.value.trim())S.resp[qi]=el.value.trim();}
    if(el.id&&el.id.startsWith('bl_')){const p=el.id.split('_');const qi=parseInt(p[1]),bi=parseInt(p[2]);if(!S.resp[qi])S.resp[qi]={};S.resp[qi][bi]=el.value.trim();}
  });
  const {puntos_auto,puntos_texto_max,puntos_maximo,detalle}=calcularNota(S.examen,S.resp);
  const tiene_texto=puntos_texto_max>0;
  const {data:rpcData,error}=await sb.rpc('public_enviar_respuesta',{
    p_examen_id:S.examen.id, p_nombre:S.est.nombre,
    p_numero_orden:parseInt(S.est.orden)||0, p_grado:S.est.grado, p_seccion:S.est.seccion,
    p_respuestas:S.resp, p_tiempo_seg:tiempoUsado(),
    p_puntos_auto:puntos_auto, p_puntos_maximo:puntos_maximo,
    p_detalle_notas:detalle, p_tiene_texto:tiene_texto
  });
  if(!error&&rpcData?.error){toast('No se pudo enviar: '+rpcData.error,4000);return;}
  if(error){toast('Error al guardar: '+error.message,4000);return;}
  S.view='enviado'; render();
}

async function procesarCSV(){
  const txt=document.getElementById('csv-input').value.trim();
  if(!txt){toast('Pega el contenido CSV');return;}
  const lines=txt.split('\n').filter(l=>l.trim()); const rows=[]; const errores=[];
  lines.forEach((line,i)=>{
    const parts=line.split(',').map(p=>p.trim());
    if(parts.length<4){errores.push('Línea '+(i+1)+': formato incorrecto');return;}
    const [grado,seccion,num,...rest]=parts; const nombre=rest.join(' ').trim(); const numero=parseInt(num);
    if(!grado||!seccion||!numero||!nombre){errores.push('Línea '+(i+1)+': datos incompletos');return;}
    rows.push({grado,seccion:seccion.toUpperCase(),numero_orden:numero,nombre,activo:true});
  });
  if(errores.length>0){toast(errores.length+' errores: '+errores[0],4000);return;}
  const {error}=await rpcAdmin('admin_upsert_estudiantes',{p_filas:rows});
  if(error){toast('Error: '+error.message,4000);return;}
  toast(rows.length+' estudiantes importados');
  document.getElementById('import-area').style.display='none';
  S.adminTab='lista'; renderAdmin();
}

        </div>

      <div id="revision-error" style="display:none;background:#FFEBEE;color:#B71C1C;border-radius:8px;padding:8px 12px;font-size:13px;flex:1"></div>
      <button class="btn btn-outline" onclick="cerrarRevision()">Cancelar</button>

function cerrarRevision(){const el=document.getElementById('revision-overlay');if(el)el.remove();}
async function guardarRevision(respId,qIndices){
  const btn=document.querySelector('#revision-overlay .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Guardando...';}
  let ptsTxt=0;
  const resp=S.respuestas.find(r=>r.id===respId);
  if(!resp){toast('Error: respuesta no encontrada',4000);return;}
  const detalle=JSON.parse(JSON.stringify(resp.detalle_notas||[]));
  qIndices.forEach(qi=>{
    const input=document.getElementById('pts_'+qi);
    const val=input?(parseInt(input.value)||0):0; ptsTxt+=val;
    const item=detalle.find(d=>d.qi===qi);
    if(item){item.pts=val;item.pendiente=false;}
    else{detalle.push({qi,pts:val,pendiente:false,auto:false});}
  });
  const ptTotal=(resp.puntos_auto||0)+ptsTxt;
  const {error}=await rpcAdmin('admin_guardar_nota',{p_resp_id:respId,p_pts_texto:ptsTxt,p_pts_total:ptTotal,p_detalle:detalle});
  if(error){
    if(btn){btn.disabled=false;btn.textContent='Guardar notas';}
    const errDiv=document.getElementById('revision-error');
    if(errDiv){errDiv.style.display='block';errDiv.textContent='Error: '+error.message;}
    toast('Error al guardar',4000); return;
  }
  cerrarRevision(); toast('Nota guardada: '+ptTotal+'/'+resp.puntos_maximo+' pts');
  await verRespuestas(S.adminExamen.id);
}

function descargarExcel(){
  const ex=S.adminExamen; const qs=ex.preguntas||[]; const resps=S.respuestas;
  const wb=XLSX.utils.book_new();
  const h1=['Nombre','Orden','Seccion','Grado','Pts Auto','Pts Texto','Pts Total','Maximo','%','Revisado','Tiempo(seg)','Enviado'];
  qs.forEach((q,i)=>h1.push('P'+(i+1)+' ['+q.tipo+']('+q.puntos+'pts): '+(q.texto||'').substring(0,35)));
  const rows=[h1];
  resps.forEach(r=>{
    const pct=(r.puntos_maximo&&r.puntos_total!=null)?Math.round(r.puntos_total/r.puntos_maximo*100)+'%':'—';
    const row=[r.nombre,r.numero_orden,r.seccion,r.grado,r.puntos_auto??'—',r.puntos_texto??'—',r.puntos_total??'—',r.puntos_maximo??'—',pct,r.texto_revisado?'Si':'Pendiente',r.tiempo_usado_seg||0,(r.submitted_at||'').substring(0,16)];
    qs.forEach((_,qi)=>{const v=r.respuestas[qi];row.push(v===undefined?'':(typeof v==='object'?JSON.stringify(v):String(v)));});
    rows.push(row);
  });
  const ws1=XLSX.utils.aoa_to_sheet(rows); ws1['!cols']=h1.map((_,i)=>({wch:i<6?16:45}));
  XLSX.utils.book_append_sheet(wb,ws1,'Respuestas');
  const h2=['#','Tipo','Pregunta','Puntos','Criterios'];
  const rub=[h2,...qs.map((q,i)=>[i+1,q.tipo,q.texto||'',q.puntos||0,q.rubrica||(q.tipo==='vf'?'Correcta: '+q.correcta:q.tipo==='multiple'?'Correcta: '+q.correcta:'—')])];
  if(ex.rubrica_txt) rub.push(['','','Rúbrica general:','',ex.rubrica_txt]);
  const ws2=XLSX.utils.aoa_to_sheet(rub); ws2['!cols']=[{wch:4},{wch:14},{wch:50},{wch:8},{wch:60}];
  XLSX.utils.book_append_sheet(wb,ws2,'Rubrica');
  XLSX.writeFile(wb,ex.titulo+'_'+ex.grado+'_P'+ex.periodo+'_'+new Date().toISOString().substring(0,10)+'.xlsx');
  toast('Excel descargado');
}

function addQ(tipo){
  const defaults={
    multiple:{tipo:'multiple',texto:'',opciones:['','','',''],correcta:'A',puntos:5},
    texto:{tipo:'texto',texto:'',puntos:10,rubrica:''},

    ordenar:{tipo:'ordenar',texto:'Ordena los siguientes elementos:',items:['Elemento 1','Elemento 2','Elemento 3'],puntos:10},
    escala:{tipo:'escala',texto:'',etiquetas:['Nada','Poco','Regular','Bastante','Mucho'],puntos:5}
  };
  S.qBuilders.push({...defaults[tipo]}); renderQBuilders();
}

function renderQBuilders(){
  const el=document.getElementById('q-list'); if(!el) return;
  const TN={multiple:'Opción múltiple',texto:'Texto libre',vf:'Verdadero/Falso',completar:'Completar la frase',ordenar:'Ordenar elementos',escala:'Escala 1-5'};
  el.innerHTML=S.qBuilders.map((q,i)=>{
    let extra='';
    if(q.tipo==='multiple'){extra='<div style="margin-top:8px">'+['A','B','C','D'].map((L,oi)=>`<div style="display:flex;gap:6px;margin-bottom:4px;align-items:center"><span style="width:20px;font-weight:700;font-size:13px">${L}</span><input type="text" value="${esc((q.opciones||[])[oi]||'')}" placeholder="Opción ${L}" oninput="S.qBuilders[${i}].opciones[${oi}]=this.value" style="flex:1;font-size:13px"><input type="radio" name="cor_${i}" ${q.correcta===L?'checked':''} onchange="S.qBuilders[${i}].correcta='${L}'" title="Correcta"></div>`).join('')+'<small style="color:var(--sub)">El círculo marca la opción correcta</small></div>';}
    else if(q.tipo==='vf'){extra=`<div style="margin-top:8px;display:flex;gap:12px;align-items:center"><span style="font-size:12px;color:var(--sub)">Correcta:</span><label><input type="radio" name="vf_${i}" ${q.correcta==='V'?'checked':''} onchange="S.qBuilders[${i}].correcta='V'"> Verdadero</label><label><input type="radio" name="vf_${i}" ${q.correcta==='F'?'checked':''} onchange="S.qBuilders[${i}].correcta='F'"> Falso</label></div>`;}
    else if(q.tipo==='ordenar'){extra=`<div style="margin-top:6px"><label style="font-size:12px">Items (uno por línea — el orden que escribas es el CORRECTO):</label><textarea rows="4" style="font-size:13px" oninput="S.qBuilders[${i}].items=this.value.split('\\n').filter(s=>s.trim())">${esc((q.items||[]).join('\n'))}</textarea></div>`;}
    else if(q.tipo==='completar'){const respArr=(q.respuestas||[]).join('\n');extra=`<small style="color:var(--sub);display:block;margin-top:4px">Usa ___ para los espacios en blanco.</small><div style="margin-top:6px"><label style="font-size:12px;color:#1B5E20;font-weight:700">Respuestas correctas (una por línea):</label><textarea rows="3" style="font-size:12px;color:#1B5E20;border-color:#A5D6A7" oninput="S.qBuilders[${i}].respuestas=this.value.split('\\n').filter(s=>s.trim())">${esc(respArr)}</textarea></div>`;}
    else if(q.tipo==='texto'){extra=`<div style="margin-top:6px"><label style="font-size:12px">Criterios de evaluación (rúbrica):</label><textarea rows="2" style="font-size:13px" oninput="S.qBuilders[${i}].rubrica=this.value">${esc(q.rubrica||'')}</textarea></div>`;}
    else if(q.tipo==='escala'){extra=`<div style="margin-top:6px"><label style="font-size:12px">Etiquetas 1-5 (separadas por coma):</label><input type="text" style="font-size:13px" value="${esc((q.etiquetas||[]).join(','))}" oninput="S.qBuilders[${i}].etiquetas=this.value.split(',').map(s=>s.trim())"></div>`;}
    return `<div class="q-builder"><span class="q-type-pill">${TN[q.tipo]}</span><button class="remove-q" onclick="S.qBuilders.splice(${i},1);renderQBuilders()">Quitar</button><label style="font-size:12px">Pregunta ${i+1}</label><textarea rows="2" style="font-size:13px" oninput="S.qBuilders[${i}].texto=this.value">${esc(q.texto||'')}</textarea><div style="display:flex;gap:8px;align-items:center;margin-top:4px"><label style="font-size:12px;margin:0;flex-shrink:0">Puntos:</label><input type="number" value="${q.puntos||5}" min="1" max="100" style="width:65px;font-size:13px" oninput="S.qBuilders[${i}].puntos=parseInt(this.value)||5"></div>${extra}</div>`;
  }).join('');
}

async function guardarExamen(){
  const titulo=document.getElementById('f-titulo').value.trim();
  if(!titulo){toast('Escribe un título');return;}
  if(S.qBuilders.length===0){toast('Agrega al menos una pregunta');return;}
  const payload={titulo,materia:document.getElementById('f-materia').value.trim(),grado:document.getElementById('f-grado').value,periodo:parseInt(document.getElementById('f-periodo').value)||1,tiempo_minutos:parseInt(document.getElementById('f-tiempo').value)||0,descripcion:document.getElementById('f-desc').value.trim(),instrucciones:document.getElementById('f-instr').value.trim(),rubrica_txt:document.getElementById('f-rubrica').value.trim(),preguntas:[...S.qBuilders],secciones_activas:getSecsActivas(),validar_lista:document.getElementById('f-validar').checked,updated_at:new Date().toISOString()};
  const {error}=await rpcAdmin('admin_upsert_examen',{p_id:S.adminExamen?S.adminExamen.id:null,p_datos:payload});
  if(error){toast('Error: '+error.message,4000);return;}
  S.qBuilders=[]; toast(S.adminExamen?'Examen actualizado':'Examen creado');
  S.adminExamen=null; S.view='admin'; renderAdmin();
}

async function rpcAdmin(fn,params){
  const {data,error}=await sb.rpc(fn,{p_pin_hash:S.pinHash,...params});
  if(error) return {error};
  if(data&&data.error) return {error:{message:data.error}};
  return {data};
}

function mostrarImportJSON(){const a=document.getElementById('import-json-area');if(a)a.style.display=a.style.display==='none'?'block':'none';}
async function procesarImportJSON(){
  const txt=document.getElementById('json-input').value.trim();
  if(!txt){toast('Pega el JSON del examen');return;}
  let data; try{data=JSON.parse(txt);}catch(e){toast('JSON inválido: '+e.message,4000);return;}
  if(!data.titulo||!Array.isArray(data.preguntas)){toast('El JSON necesita titulo + preguntas');return;}
  const payload={titulo:data.titulo,descripcion:data.descripcion||'',grado:data.grado||'',periodo:parseInt(data.periodo)||0,tiempo_minutos:parseInt(data.tiempo_minutos)||0,instrucciones:data.instrucciones||'',rubrica_txt:data.rubrica_txt||'',preguntas:data.preguntas,secciones_activas:data.secciones_activas||[],validar_lista:data.validar_lista||false,activo:false,updated_at:new Date().toISOString()};
  const {error}=await rpcAdmin('admin_upsert_examen',{p_id:null,p_datos:payload});
  if(error){toast('Error al importar: '+error.message,4000);return;}
  toast('Examen importado: '+data.titulo);
  document.getElementById('import-json-area').style.display='none';
  document.getElementById('json-input').value='';
  S.adminTab='examenes'; renderAdmin();
}

function exportarWord(){
  const ex=S.adminExamen; const qs=ex.preguntas||[];
  const TIPO_LABEL={multiple:'Opción múltiple',texto:'Respuesta abierta',vf:'Verdadero / Falso',completar:'Completar la frase',ordenar:'Ordenar elementos',escala:'Escala 1-5'};
  const LETRAS=['A','B','C','D']; let doc='';
  doc+='EXAMEN\n'+ex.titulo+'\n'+ex.grado+' | Período '+ex.periodo+(ex.tiempo_minutos>0?' | Tiempo: '+ex.tiempo_minutos+' min':'')+'\n\n';
  doc+='Nombre: _________________________________________________\nNúmero de orden: _____ Sección: _____ Grado: _____\nFecha: ___________________\n\n';
  if(ex.instrucciones) doc+='INSTRUCCIONES: '+ex.instrucciones+'\n\n';
  doc+='='.repeat(60)+'\n\n';
  let totalPts=0;
  qs.forEach((q,i)=>{
    const pts=q.puntos||0; totalPts+=pts;
    doc+=(i+1)+'. ['+TIPO_LABEL[q.tipo]+' | '+pts+' pts]\n'+q.texto+'\n\n';
    if(q.tipo==='multiple'){(q.opciones||[]).forEach((op,oi)=>{doc+='   ('+LETRAS[oi]+') '+op+'\n';});doc+='\n   Mi respuesta: ( )A  ( )B  ( )C  ( )D\n';}
    else if(q.tipo==='vf'){doc+='   ( ) Verdadero     ( ) Falso\n';}
    else if(q.tipo==='ordenar'){doc+='   Ordena del 1 al '+(q.items||[]).length+':\n';(q.items||[]).forEach(it=>{doc+='   ( ) '+it+'\n';});}
    else if(q.tipo==='escala'){const lbs=q.etiquetas||['1','2','3','4','5'];doc+='   Marca con X:\n   [ ] 1-'+lbs[0]+'  [ ] 2-'+lbs[1]+'  [ ] 3-'+lbs[2]+'  [ ] 4-'+lbs[3]+'  [ ] 5-'+lbs[4]+'\n';}
    else if(q.tipo==='texto'){doc+='   ________________________________________________________________\n'.repeat(6);}
    doc+='\n';
  });
  doc+='='.repeat(60)+'\nTOTAL: '+totalPts+' puntos\n\n';
  if(ex.rubrica_txt||qs.some(q=>q.rubrica)){
    doc+='RÚBRICA (uso del docente)\n'+'-'.repeat(40)+'\n';
    if(ex.rubrica_txt) doc+='General: '+ex.rubrica_txt+'\n\n';
    qs.forEach((q,i)=>{if(q.rubrica)doc+='P'+(i+1)+': '+q.rubrica+'\n';else if(q.tipo==='multiple'||q.tipo==='vf')doc+='P'+(i+1)+': Respuesta correcta: '+q.correcta+'\n';});
  }
  const blob=new Blob([doc],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=ex.titulo+'_'+ex.grado+'_P'+ex.periodo+'_'+new Date().toISOString().substring(0,10)+'.txt';
  a.click(); URL.revokeObjectURL(url); toast('Documento descargado');
}

render();
</script>
